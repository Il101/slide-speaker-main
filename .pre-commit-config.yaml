# Pre-commit hooks configuration
# Install: pip install pre-commit && pre-commit install

repos:
  # ============================================================================
  # General checks
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of files
      - id: check-yaml
        name: Check YAML syntax
      - id: check-json
        name: Check JSON syntax
      - id: check-toml
        name: Check TOML syntax
      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=1000']
      - id: check-case-conflict
        name: Check for case conflicts
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: detect-private-key
        name: Detect private keys
      - id: mixed-line-ending
        name: Fix mixed line endings
        args: ['--fix=lf']

  # ============================================================================
  # Python - Code formatting
  # ============================================================================
  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black
        name: Format Python code with Black
        language_version: python3.11
        args: ['--line-length=120']
        files: ^backend/

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort Python imports with isort
        args: ['--profile', 'black', '--line-length', '120']
        files: ^backend/

  # ============================================================================
  # Python - Linting
  # ============================================================================
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Lint Python code with Flake8
        args: ['--max-line-length=120', '--extend-ignore=E203,W503']
        files: ^backend/
        exclude: ^backend/venv/

  - repo: https://github.com/pycqa/pylint
    rev: v3.0.3
    hooks:
      - id: pylint
        name: Lint Python code with Pylint
        args: ['--disable=C0111,C0103,R0903']
        files: ^backend/app/
        exclude: ^backend/venv/

  # ============================================================================
  # Python - Type checking
  # ============================================================================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: Type check Python code with MyPy
        args: ['--ignore-missing-imports', '--no-strict-optional']
        files: ^backend/app/
        additional_dependencies:
          - types-requests
          - types-redis

  # ============================================================================
  # Python - Security
  # ============================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        name: Security check with Bandit
        args: ['-ll', '-r', 'backend/app']
        files: ^backend/

  # ============================================================================
  # JavaScript/TypeScript - Formatting
  # ============================================================================
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Format JS/TS with Prettier
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown]
        exclude: ^backend/

  # ============================================================================
  # JavaScript/TypeScript - Linting
  # ============================================================================
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        name: Lint JS/TS with ESLint
        files: \.(js|jsx|ts|tsx)$
        types: [file]
        exclude: ^backend/
        additional_dependencies:
          - eslint@8.56.0
          - '@typescript-eslint/eslint-plugin@6.19.0'
          - '@typescript-eslint/parser@6.19.0'

  # ============================================================================
  # Docker
  # ============================================================================
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        name: Lint Dockerfiles
        files: Dockerfile.*

  # ============================================================================
  # Secrets detection
  # ============================================================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock.json

  # ============================================================================
  # Commit message validation
  # ============================================================================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        name: Check commit message format
        stages: [commit-msg]

  # ============================================================================
  # Custom local hooks
  # ============================================================================
  - repo: local
    hooks:
      # Fast tests before commit
      - id: pytest-check
        name: Run fast unit tests
        entry: bash -c 'cd backend && pytest tests/unit -x --tb=short'
        language: system
        pass_filenames: false
        always_run: false
        files: ^backend/
        stages: [push]  # Only run on push, not every commit

      # Check Python imports
      - id: python-imports
        name: Check Python imports
        entry: python -c "import sys; sys.exit(0)"
        language: system
        files: \.py$
        exclude: ^backend/venv/

      # Frontend build check
      - id: frontend-build
        name: Check frontend builds
        entry: bash -c 'npm run type-check'
        language: system
        pass_filenames: false
        files: \.(ts|tsx)$
        exclude: ^backend/
        stages: [push]

# Configuration
default_language_version:
  python: python3.11
  node: '18.0.0'

# Performance settings
minimum_pre_commit_version: '2.20.0'

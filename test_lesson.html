<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест лекции с полным пайплайном</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .lesson-info {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .slide {
            border: 1px solid #ddd;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .speaker-notes {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .note {
            margin: 5px 0;
            padding: 5px;
            background: white;
            border-radius: 3px;
        }
        .audio-info {
            background: #f0f8f0;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Тест лекции с полным пайплайном ИИ</h1>
    
    <div class="lesson-info">
        <h2>Информация о лекции</h2>
        <p><strong>ID лекции:</strong> <span id="lesson-id">aa3b5858-4cc0-4d67-8cf6-11a4a1d12acd</span></p>
        <p><strong>Статус:</strong> <span id="lesson-status">Загрузка...</span></p>
    </div>

    <div id="lesson-content">
        <p>Загрузка контента лекции...</p>
    </div>

    <script>
        const lessonId = 'aa3b5858-4cc0-4d67-8cf6-11a4a1d12acd';
        
        async function loadLesson() {
            try {
                // Загружаем манифест
                const response = await fetch(`http://localhost:8000/lessons/${lessonId}/manifest`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const manifest = await response.json();
                
                // Обновляем статус
                document.getElementById('lesson-status').textContent = 'Загружено успешно';
                document.getElementById('lesson-status').className = 'status success';
                
                // Отображаем контент
                const contentDiv = document.getElementById('lesson-content');
                contentDiv.innerHTML = '';
                
                manifest.slides.forEach((slide, index) => {
                    const slideDiv = document.createElement('div');
                    slideDiv.className = 'slide';
                    
                    slideDiv.innerHTML = `
                        <h3>Слайд ${slide.id}</h3>
                        <p><strong>Изображение:</strong> ${slide.image}</p>
                        <p><strong>Аудио:</strong> ${slide.audio || 'Не сгенерировано'}</p>
                        <p><strong>Длительность:</strong> ${slide.duration || 0} секунд</p>
                        
                        <h4>Элементы слайда:</h4>
                        <ul>
                            ${slide.elements.map(el => `<li><strong>${el.type}:</strong> ${el.text}</li>`).join('')}
                        </ul>
                        
                        <div class="speaker-notes">
                            <h4>Speaker Notes (сгенерированы ИИ):</h4>
                            ${slide.speaker_notes ? slide.speaker_notes.map(note => 
                                `<div class="note"><strong>${note.targetId}:</strong> ${note.text}</div>`
                            ).join('') : '<p>Speaker notes не сгенерированы</p>'}
                        </div>
                        
                        <div class="audio-info">
                            <h4>Информация об аудио:</h4>
                            <p><strong>Статус:</strong> ${slide.audio ? 'Сгенерировано' : 'Не сгенерировано'}</p>
                            <p><strong>Длительность:</strong> ${slide.duration || 0} секунд</p>
                        </div>
                    `;
                    
                    contentDiv.appendChild(slideDiv);
                });
                
                // Проверяем статус обработки
                const statusResponse = await fetch(`http://localhost:8000/lessons/${lessonId}/status`);
                if (statusResponse.ok) {
                    const status = await statusResponse.json();
                    const statusDiv = document.createElement('div');
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = `
                        <h4>Статус обработки:</h4>
                        <p><strong>Статус:</strong> ${status.status}</p>
                        <p><strong>Сообщение:</strong> ${status.message}</p>
                        <p><strong>Слайдов обработано:</strong> ${status.slides_processed}</p>
                        <p><strong>Слайдов с speaker notes:</strong> ${status.slides_with_notes}</p>
                        <p><strong>Слайдов с аудио:</strong> ${status.slides_with_audio}</p>
                    `;
                    contentDiv.appendChild(statusDiv);
                }
                
            } catch (error) {
                console.error('Ошибка загрузки лекции:', error);
                document.getElementById('lesson-status').textContent = `Ошибка: ${error.message}`;
                document.getElementById('lesson-status').className = 'status error';
            }
        }
        
        // Загружаем лекцию при загрузке страницы
        loadLesson();
    </script>
</body>
</html>

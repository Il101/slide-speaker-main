<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест аудио</title>
</head>
<body>
    <h1>Тест аудио воспроизведения</h1>
    
    <h2>Слайд 1</h2>
    <audio controls>
        <source src="http://localhost:8000/assets/04949ebc-d566-4168-a8e0-052aa0dc3df6/audio/001.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает аудио элемент.
    </audio>
    
    <h2>Слайд 2</h2>
    <audio controls>
        <source src="http://localhost:8000/assets/04949ebc-d566-4168-a8e0-052aa0dc3df6/audio/002.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает аудио элемент.
    </audio>
    
    <h2>Слайд 3</h2>
    <audio controls>
        <source src="http://localhost:8000/assets/04949ebc-d566-4168-a8e0-052aa0dc3df6/audio/003.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает аудио элемент.
    </audio>
    
    <script>
        // Проверяем загрузку аудио
        document.querySelectorAll('audio').forEach((audio, index) => {
            audio.addEventListener('loadstart', () => {
                console.log(`Аудио ${index + 1} начало загружаться`);
            });
            
            audio.addEventListener('canplay', () => {
                console.log(`Аудио ${index + 1} готово к воспроизведению`);
            });
            
            audio.addEventListener('error', (e) => {
                console.error(`Ошибка загрузки аудио ${index + 1}:`, e);
            });
        });
    </script>
</body>
</html>

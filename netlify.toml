[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  VITE_API_BASE = "https://your-railway-app.up.railway.app"
  VITE_WS_URL = "wss://your-railway-app.up.railway.app"

[context.deploy-preview.environment]
  VITE_API_BASE = "https://your-railway-app.up.railway.app"
  VITE_WS_URL = "wss://your-railway-app.up.railway.app"

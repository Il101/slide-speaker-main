name: Google Cloud Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'  # Run every Monday at 2 AM UTC

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  test-mock-providers:
    name: Test with Mock Providers
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install Python dependencies
      run: |
        cd backend
        pip install -r requirements-test.txt
    
    - name: Install Node.js dependencies
      run: |
        npm install
    
    - name: Run Google Cloud integration tests (mock mode)
      env:
        OCR_PROVIDER: mock
        LLM_PROVIDER: mock
        TTS_PROVIDER: mock
        STORAGE: mock
        GCP_PROJECT_ID: test-project
        GCP_LOCATION: us-central1
        GCP_DOC_AI_PROCESSOR_ID: test-processor
        GEMINI_MODEL: gemini-1.5-flash
        GOOGLE_TTS_VOICE: ru-RU-Neural2-B
        GCS_BUCKET: test-bucket
      run: |
        python test_google_cloud_simple.py
    
    - name: Run backend tests
      run: |
        cd backend
        python -m pytest app/tests/test_simple.py -v
    
    - name: Run frontend tests
      run: |
        npm run test:ci

  test-with-google-cloud:
    name: Test with Google Cloud (if secrets available)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install Python dependencies
      run: |
        cd backend
        pip install -r requirements-test.txt
    
    - name: Install Node.js dependencies
      run: |
        npm install
    
    - name: Set up Google Cloud credentials
      if: env.GCP_SA_JSON != ''
      run: |
        echo '${{ secrets.GCP_SA_JSON }}' | base64 -d > backend/app/keys/gcp-sa.json
        mkdir -p backend/app/keys
        chmod 600 backend/app/keys/gcp-sa.json
    
    - name: Run Google Cloud integration tests (real providers)
      if: env.GCP_SA_JSON != ''
      env:
        OCR_PROVIDER: google
        LLM_PROVIDER: gemini
        TTS_PROVIDER: google
        STORAGE: gcs
        GOOGLE_APPLICATION_CREDENTIALS: backend/app/keys/gcp-sa.json
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        GCP_LOCATION: ${{ secrets.GCP_LOCATION }}
        GCP_DOC_AI_PROCESSOR_ID: ${{ secrets.GCP_DOC_AI_PROCESSOR_ID }}
        GEMINI_MODEL: gemini-1.5-flash
        GOOGLE_TTS_VOICE: ru-RU-Neural2-B
        GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        GCS_BASE_URL: ${{ secrets.GCS_BASE_URL }}
      run: |
        python test_google_cloud_simple.py
    
    - name: Run E2E tests with Google Cloud
      if: env.GCP_SA_JSON != ''
      env:
        OCR_PROVIDER: google
        LLM_PROVIDER: gemini
        TTS_PROVIDER: google
        STORAGE: gcs
        GOOGLE_APPLICATION_CREDENTIALS: backend/app/keys/gcp-sa.json
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        GCP_LOCATION: ${{ secrets.GCP_LOCATION }}
        GCP_DOC_AI_PROCESSOR_ID: ${{ secrets.GCP_DOC_AI_PROCESSOR_ID }}
        GEMINI_MODEL: gemini-1.5-flash
        GOOGLE_TTS_VOICE: ru-RU-Neural2-B
        GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        GCS_BASE_URL: ${{ secrets.GCS_BASE_URL }}
      run: |
        # Start services
        docker-compose up -d
        
        # Wait for services to be ready
        sleep 30
        
        # Run E2E tests
        python test_api.py
        
        # Cleanup
        docker-compose down

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-mock-providers]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Google Container Registry
      if: env.GCP_SA_JSON != ''
      uses: docker/login-action@v3
      with:
        registry: gcr.io
        username: _json_key
        password: ${{ secrets.GCP_SA_JSON }}
    
    - name: Build and push Docker images
      if: env.GCP_SA_JSON != ''
      run: |
        # Build backend image
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/slide-speaker-backend:latest ./backend
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/slide-speaker-backend:latest
        
        # Build frontend image
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/slide-speaker-frontend:latest .
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/slide-speaker-frontend:latest
    
    - name: Deploy to Google Cloud Run
      if: env.GCP_SA_JSON != ''
      run: |
        # Deploy backend
        gcloud run deploy slide-speaker-backend \
          --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/slide-speaker-backend:latest \
          --platform managed \
          --region ${{ secrets.GCP_LOCATION }} \
          --allow-unauthenticated
        
        # Deploy frontend
        gcloud run deploy slide-speaker-frontend \
          --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/slide-speaker-frontend:latest \
          --platform managed \
          --region ${{ secrets.GCP_LOCATION }} \
          --allow-unauthenticated

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        cd backend
        pip install bandit safety
    
    - name: Run Bandit security scan
      run: |
        cd backend
        bandit -r app/ -f json -o bandit-report.json || true
    
    - name: Run Safety check
      run: |
        cd backend
        safety check --json --output safety-report.json || true
    
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          backend/bandit-report.json
          backend/safety-report.json

  dependency-update:
    name: Dependency Update
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'  # Only run on schedule, not on every push
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
    
    - name: Update Python dependencies
      run: |
        cd backend
        pip install pip-tools
        pip-compile --upgrade requirements.in || true
    
    - name: Update Node.js dependencies
      run: |
        npm update
    
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update dependencies'
        title: 'chore: update dependencies'
        body: |
          This PR updates project dependencies to their latest versions.
          
          - Updated Python packages in requirements.txt
          - Updated Node.js packages in package.json
          
          Please review the changes and test thoroughly before merging.
        branch: dependency-update
        base: main
        delete-branch: true
groups:
  - name: slide-speaker-alerts
    rules:
      - alert: HighErrorRate
        expr: rate(slide_speaker_errors_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second"

      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, rate(slide_speaker_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency"
          description: "95th percentile latency is {{ $value }} seconds"

      - alert: TooManyFailedTasks
        expr: rate(slide_speaker_celery_task_failures_total[5m]) > 0.05
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Too many failed Celery tasks"
          description: "Task failure rate is {{ $value }} failures per second"

      - alert: DatabaseConnectionsHigh
        expr: slide_speaker_database_connections > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High database connection count"
          description: "Database connections: {{ $value }}"

      - alert: RedisConnectionsHigh
        expr: slide_speaker_redis_connections > 50
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High Redis connection count"
          description: "Redis connections: {{ $value }}"

      - alert: QueueSizeHigh
        expr: slide_speaker_queue_size > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High queue size"
          description: "Queue {{ $labels.queue_name }} has {{ $value }} tasks"

      - alert: ProcessingTimeHigh
        expr: histogram_quantile(0.95, rate(slide_speaker_processing_time_seconds_bucket[10m])) > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High processing time"
          description: "95th percentile processing time is {{ $value }} seconds"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service is down"
          description: "{{ $labels.job }} service is down"

      - alert: HighMemoryUsage
        expr: (process_resident_memory_bytes / 1024 / 1024) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }} MB"

      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}"

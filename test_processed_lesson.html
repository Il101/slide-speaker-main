<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест обработанной лекции</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .slide {
            background: white;
            color: black;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .slide img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
        .audio-controls {
            margin: 10px 0;
        }
        .speaker-notes {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        .speaker-notes h4 {
            margin-top: 0;
            color: #333;
        }
        .speaker-notes p {
            margin: 5px 0;
            color: #666;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Тест обработанной лекции</h1>
        <p>Lesson ID: 04949ebc-d566-4168-a8e0-052aa0dc3df6</p>
        <button onclick="loadManifest()">Загрузить данные</button>
        <button onclick="playAllAudio()">Воспроизвести все аудио</button>
    </div>

    <div id="slides-container"></div>

    <script>
        let manifest = null;
        let audioElements = [];

        async function loadManifest() {
            try {
                const response = await fetch('http://localhost:8000/lessons/04949ebc-d566-4168-a8e0-052aa0dc3df6/manifest');
                manifest = await response.json();
                displaySlides();
            } catch (error) {
                console.error('Ошибка загрузки manifest:', error);
                alert('Ошибка загрузки данных: ' + error.message);
            }
        }

        function displaySlides() {
            const container = document.getElementById('slides-container');
            container.innerHTML = '';

            manifest.slides.forEach((slide, index) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = 'slide';
                
                slideDiv.innerHTML = `
                    <h3>Слайд ${slide.id}</h3>
                    <img src="http://localhost:8000${slide.image}" alt="Slide ${slide.id}">
                    
                    <div class="audio-controls">
                        <audio id="audio-${slide.id}" controls>
                            <source src="http://localhost:8000${slide.audio}" type="audio/mpeg">
                            Ваш браузер не поддерживает аудио элемент.
                        </audio>
                        <button onclick="playSlideAudio(${slide.id})">Воспроизвести</button>
                        <button onclick="pauseSlideAudio(${slide.id})">Пауза</button>
                    </div>

                    <div class="speaker-notes">
                        <h4>Speaker Notes:</h4>
                        ${slide.speaker_notes ? slide.speaker_notes.map(note => 
                            `<p><strong>${note.targetId}:</strong> ${note.text}</p>`
                        ).join('') : '<p>Нет speaker notes</p>'}
                    </div>
                `;

                container.appendChild(slideDiv);
            });

            // Сохраняем ссылки на аудио элементы
            audioElements = manifest.slides.map(slide => ({
                id: slide.id,
                element: document.getElementById(`audio-${slide.id}`)
            }));
        }

        function playSlideAudio(slideId) {
            const audio = document.getElementById(`audio-${slideId}`);
            if (audio) {
                audio.play();
            }
        }

        function pauseSlideAudio(slideId) {
            const audio = document.getElementById(`audio-${slideId}`);
            if (audio) {
                audio.pause();
            }
        }

        function playAllAudio() {
            audioElements.forEach(audio => {
                if (audio.element) {
                    audio.element.play();
                }
            });
        }

        // Автоматически загружаем данные при загрузке страницы
        window.onload = function() {
            loadManifest();
        };
    </script>
</body>
</html>

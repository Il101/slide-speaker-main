[pytest]
# Pytest configuration with coverage for Slide Speaker

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    # Coverage
    --cov=app
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=70
    
    # Verbosity
    -v
    --tb=short
    
    # Warnings
    -W ignore::DeprecationWarning
    -W ignore::PendingDeprecationWarning
    
    # Show test durations (slowest 10)
    --durations=10
    
    # Strict markers (fail on unknown markers)
    --strict-markers
    
    # Show local variables in tracebacks
    -l
    
    # Exit on first failure (useful for debugging)
    # --exitfirst
    
    # Run failed tests first
    # --failed-first
    
    # Parallel execution (uncomment when stable)
    # -n auto

# Markers for test organization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (with DB, Redis, etc)
    e2e: End-to-end tests (full flow)
    slow: Slow tests (may take >1s)
    google_cloud: Tests requiring Google Cloud credentials
    api: API endpoint tests
    pipeline: Pipeline processing tests
    security: Security-related tests
    smoke: Smoke tests (basic functionality)

# Coverage configuration
[coverage:run]
source = app
omit =
    */tests/*
    */test_*.py
    */__init__.py
    */venv/*
    */site-packages/*
    */conftest.py
    # Legacy code (to be refactored)
    app/services/sprint1/*
    app/services/sprint2/*
    app/services/sprint3/*

branch = True
parallel = True

[coverage:report]
precision = 2
skip_empty = True
show_missing = True
sort = Cover

# Fail if coverage is below these thresholds
fail_under = 70

exclude_lines =
    # Standard pragma
    pragma: no cover
    
    # Don't complain about missing debug code
    def __repr__
    def __str__
    
    # Don't complain if tests don't hit defensive assertion code
    raise AssertionError
    raise NotImplementedError
    
    # Don't complain if non-runnable code isn't run
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    
    # Don't complain about abstract methods
    @abstractmethod
    @abc.abstractmethod
    
    # Don't complain about pass statements
    pass
    
    # Don't complain about ellipsis
    \.\.\.

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml

# Asyncio configuration
asyncio_mode = auto

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Timeout (fail tests that run too long)
timeout = 60
timeout_method = thread

# Temp directory
tmp_path_retention_count = 3
tmp_path_retention_policy = all
